<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    .chevron {
      stroke: #00f2fe;
      stroke-width: 5.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .letter {
      stroke: #ffffff;
      stroke-width: 5.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .slash {
      stroke: #00f2fe;
      stroke-width: 5.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    @media (prefers-color-scheme: light) {
      .letter {
        stroke: #090d16;
      }
    }
  </style>
  <!-- Left Chevron '<' -->
  <path class="chevron" d="M 17,20 L 7,32 L 17,44" />
  
  <!-- Custom Geometric 'B' -->
  <path class="letter" d="M 23,20 V 44 M 23,20 H 29 C 33,20 33,31 29,31 H 23 M 23,31 H 30 C 34,31 34,44 30,44 H 23" />
  
  <!-- Closing Slash '/' -->
  <path class="slash" d="M 37,44 L 43,20" />
  
  <!-- Right Chevron '>' -->
  <path class="chevron" d="M 49,20 L 59,32 L 49,44" />
</svg>
