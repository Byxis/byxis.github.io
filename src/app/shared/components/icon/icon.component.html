<svg
  [attr.width]="size"
  [attr.height]="size"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  [attr.stroke-width]="strokeWidth"
  stroke-linecap="round"
  stroke-linejoin="round"
  [class]="customClass"
>
  @switch (name) {
    @case ('video') {
      <path d="m22 8-6 4 6 4V8z" />
      <rect width="14" height="12" x="2" y="6" rx="2" ry="2" />
    }

    @case ('github') {
      <path
        d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
      />

      <path d="M9 18c-4.51 2-5-2-7-2" />
    }

    @case ('linkedin') {
      <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />

      <rect x="2" y="9" width="4" height="12" />

      <circle cx="4" cy="4" r="2" />
    }

    @case ('search') {
      <circle cx="11" cy="11" r="8" />

      <path d="m21 21-4.3-4.3" />
    }

    @case ('calendar') {
      <path d="M8 2v4" />

      <path d="M16 2v4" />

      <rect width="18" height="18" x="3" y="4" rx="2" />

      <path d="M3 10h18" />
    }

    @case ('close') {
      <path d="M18 6 6 18" />

      <path d="m6 6 12 12" />
    }

    @case ('arrow-right') {
      <path d="M5 12h14" />

      <path d="m12 5 7 7-7 7" />
    }

    @case ('external-link') {
      <path d="M15 3h6v6" />

      <path d="M10 14 21 3" />

      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
    }

    @case ('cv') {
      <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />

      <polyline points="14 2 14 8 20 8" />

      <line x1="16" y1="13" x2="8" y2="13" />

      <line x1="16" y1="17" x2="8" y2="17" />

      <line x1="10" y1="9" x2="8" y2="9" />
    }

    @case ('mail') {
      <rect width="20" height="16" x="2" y="4" rx="2" />

      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
    }

    @case ('menu') {
      <line x1="4" x2="20" y1="12" y2="12" />

      <line x1="4" x2="20" y1="6" y2="6" />

      <line x1="4" x2="20" y1="18" y2="18" />
    }

    @case ('chevron-down') {
      <path d="m6 9 6 6 6-6" />
    }

    @case ('check') {
      <path d="M20 6 9 17l-5-5" />
    }

    @case ('briefcase') {
      <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />

      <rect width="20" height="14" x="2" y="6" rx="2" />
    }

    @case ('graduation-cap') {
      <path
        d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"
      />

      <path d="M6 12.5v5c0 1.25.75 2.5 2 3a7 7 0 0 0 8 0c1.25-.5 2-1.75 2-3v-5" />
    }

    @case ('code') {
      <polyline points="16 18 22 12 16 6" />

      <polyline points="8 6 2 12 8 18" />
    }

    @case ('user') {
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />

      <circle cx="12" cy="7" r="4" />
    }

    @case ('download') {
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />

      <polyline points="7 10 12 15 17 10" />

      <line x1="12" x2="12" y1="15" y2="3" />
    }

    @case ('itchio') {
      <path
        d="M12 3L3 9v6c0 3 2 5 4 6l5 3 5-3c2-1 4-3 4-6V9l-9-6z"
        fill="none"
        stroke-width="1.5"
      />

      <path d="M9 11v3M15 11v3M12 11v5" stroke-width="1.2" />
    }

    @case ('steam') {
      <path
        d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z"
      />

      <circle cx="8" cy="12" r="2" />

      <circle cx="16" cy="12" r="2" />
    }

    @case ('meta-quest') {
      <circle cx="12" cy="12" r="10" />

      <path d="M9 12a3 3 0 0 1 6 0" stroke-width="2" />
    }

    @case ('google-play') {
      <path d="M4 4 L20 14 L4 24 Z" />
    }

    @case ('app-store') {
      <path
        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11z"
      />
    }
    @case ('google-play') {
      <polygon
        points="4 4, 20 12, 4 20"
        fill="none"
        stroke="currentColor"
        [attr.stroke-width]="strokeWidth"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    }
    @case ('meta-quest') {
      <circle
        cx="12"
        cy="12"
        r="10"
        fill="none"
        stroke="currentColor"
        [attr.stroke-width]="strokeWidth"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <path
        d="M9 12a3 3 0 0 1 6 0"
        fill="none"
        stroke="currentColor"
        [attr.stroke-width]="strokeWidth"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    }
    @case ('app-store') {
      <path
        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11z"
        fill="none"
        stroke="currentColor"
        [attr.stroke-width]="strokeWidth"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    }
    @case ('network') {
      <rect x="2" y="3" width="20" height="8" rx="2" />
      <rect x="2" y="13" width="20" height="8" rx="2" />
      <line x1="6" y1="7" x2="6.01" y2="7" />
      <line x1="6" y1="17" x2="6.01" y2="17" />
      <line x1="20" y1="7" x2="20.01" y2="7" />
      <line x1="20" y1="17" x2="20.01" y2="17" />
    }
  }
</svg>
